server.port=8080
spring.application.name=api-gateway

# Gateway Routing - Auth Service Public
spring.cloud.gateway.routes[0].id=auth-service-public
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/login, /api/auth/register, /api/auth/forgot-password, /api/auth/verify-otp, /api/auth/reset-password
spring.cloud.gateway.routes[0].filters[0]=CircuitBreaker=auth-breaker,forward:/fallback

# Gateway Routing - Auth Service Protected
spring.cloud.gateway.routes[5].id=auth-service-protected
spring.cloud.gateway.routes[5].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/auth/users/**, /api/auth/create-admin, /api/auth/logout
spring.cloud.gateway.routes[5].filters[0]=AuthFilter

spring.cloud.gateway.routes[1].id=file-service
spring.cloud.gateway.routes[1].uri=lb://FILE-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/files/**
spring.cloud.gateway.routes[1].filters[0]=AuthFilter

spring.cloud.gateway.routes[2].id=nic-service
spring.cloud.gateway.routes[2].uri=lb://NIC-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/nic/**
spring.cloud.gateway.routes[2].filters[0]=AuthFilter

spring.cloud.gateway.routes[3].id=dashboard-service
spring.cloud.gateway.routes[3].uri=lb://DASHBOARD-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/dashboard/**
spring.cloud.gateway.routes[3].filters[0]=AuthFilter

spring.cloud.gateway.routes[4].id=report-service
spring.cloud.gateway.routes[4].uri=lb://REPORT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/reports/**
spring.cloud.gateway.routes[4].filters[0]=AuthFilter

# HTTP Client Timeouts
spring.cloud.gateway.httpclient.connect-timeout=30000
spring.cloud.gateway.httpclient.response-timeout=30s

# Resilience4j Timeout for Circuit Breaker
resilience4j.timelimiter.instances.auth-breaker.timeout-duration=10s

# CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins[0]=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins[1]=http://localhost:5174
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins[2]=http://localhost:5175
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins[3]=http://localhost:5176
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins[4]=http://127.0.0.1:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins[5]=http://127.0.0.1:5174
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins[6]=http://127.0.0.1:5175
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins[7]=http://127.0.0.1:5176
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[0]=GET
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[1]=POST
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[2]=PUT
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[3]=DELETE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[4]=OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# Eureka Client
eureka.client.service-url.defaultZone=http://127.0.0.1:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT Details
jwt.secret=mobiOs_NIC_Validator_SecretKey_2024_SuperSecure_JWT_256bit

# Logging
logging.level.org.springframework.cloud.gateway=INFO
